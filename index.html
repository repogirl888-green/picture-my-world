<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cue Sheet</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const { Search, Plus, Loader2, AlertCircle, Download, Trash2, BookOpen, Music, ChevronRight, CheckCircle2 } = lucide;

const COLORS = {
  paper: "#EDEFF2",
  card: "#FBFAF6",
  ink: "#23262B",
  inkSoft: "#5B6168",
  hairline: "#C7CBD1",
  clear: "#2F6B4F",
  clearFill: "#D9E8DF",
  gap: "#B5562C",
  pending: "#A98B33",
};

const FONT_DISPLAY = "'Playfair Display', serif";
const FONT_BODY = "'Work Sans', ui-sans-serif, system-ui, sans-serif";
const FONT_MONO = "'JetBrains Mono', ui-monospace, monospace";

const WORK_TYPES = [
  { value: "song", label: "Song / Composition" },
  { value: "score", label: "Score / Instrumental Work" },
  { value: "screenplay", label: "Screenplay / Treatment" },
  { value: "manuscript", label: "Book / Manuscript" },
  { value: "other", label: "Other" },
];

const EXPECTED_REGISTRATIONS = {
  song: ["Performing Rights Org (ASCAP/BMI/SESAC)", "U.S. Copyright Office", "Mechanical Licensing (MLC)"],
  score: ["U.S. Copyright Office", "Performing Rights Org (ASCAP/BMI/SESAC)"],
  screenplay: ["WGA Registry", "U.S. Copyright Office"],
  manuscript: ["U.S. Copyright Office"],
  other: ["U.S. Copyright Office"],
};

const REGISTRATION_BODIES = [
  "Performing Rights Org (ASCAP/BMI/SESAC)",
  "U.S. Copyright Office",
  "Mechanical Licensing (MLC)",
  "WGA Registry",
  "Other",
];

const USE_CASES = [
  { value: "sample", label: "Sampling it" },
  { value: "cover", label: "Recording a cover" },
  { value: "interpolation", label: "Interpolating a melody/lyric" },
  { value: "sync", label: "Sync / film placement" },
  { value: "quote", label: "Quoting it" },
  { value: "other", label: "Other use" },
];

const CLEARANCE_STATUSES = [
  { value: "cleared", label: "Cleared / licensed" },
  { value: "public_domain", label: "Public domain" },
  { value: "needs_license", label: "Needs licensing" },
];

const SYSTEM_PROMPT = `You are a music and creative-rights research assistant. Given a piece of music, writing, or other creative work someone wants to use (a sample, cover, interpolation, quote, or archival clip), search the web to determine who currently holds the rights, whether the work is in the public domain, and what licensing path is typically required (sync, master, mechanical, or PRO clearance). Draw on PRO repertory databases (ASCAP, BMI, SESAC), the U.S. Copyright Office public catalog, label and publisher catalogs, and music industry press.

Respond with ONLY raw JSON, no markdown fences, no commentary, in exactly this shape:
{"leads":[{"sourceType":"string","summary":"1-2 sentences in your own words, no quoted text","confidence":"high|medium|low","rightsHolder":"string or empty","url":"string or empty"}],"nextSteps":["string","string","string"],"contextNote":"one short sentence on the overall clearance picture, if relevant"}

Return at most 5 leads. Be honest about uncertainty — rights ownership can be split, sold, or reverted, and public domain status depends on jurisdiction and publication date.`;

function uid() {
  if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
  return "id-" + Date.now() + "-" + Math.random().toString(36).slice(2, 9);
}

function StaffBadge({ status }) {
  const color = status === "clear" ? COLORS.clear : status === "pending" ? COLORS.pending : COLORS.gap;
  const cy = status === "gap" ? 29 : status === "pending" ? 14 : 11.5;
  return (
    <svg width="30" height="34" viewBox="0 0 30 34" aria-hidden="true" className="shrink-0">
      {[4, 9, 14, 19, 24].map((y) => (
        <line key={y} x1="2" y1={y} x2="28" y2={y} stroke={COLORS.hairline} strokeWidth="1" />
      ))}
      {status === "gap" && <line x1="9" y1="29" x2="21" y2="29" stroke={color} strokeWidth="1.4" />}
      <circle cx="15" cy={cy} r="3.4" fill={status === "pending" ? "none" : color} stroke={color} strokeWidth={status === "pending" ? 1.6 : 0} />
    </svg>
  );
}

function WorkCard({ work, onAddRegistration, onDelete }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [showAddReg, setShowAddReg] = useState(false);
  const [regBody, setRegBody] = useState(REGISTRATION_BODIES[0]);
  const [regBodyOther, setRegBodyOther] = useState("");
  const [regStatus, setRegStatus] = useState("registered");
  const [regCase, setRegCase] = useState("");
  const [regDate, setRegDate] = useState("");
  const [regExpires, setRegExpires] = useState("");

  const expected = EXPECTED_REGISTRATIONS[work.type] || EXPECTED_REGISTRATIONS.other;

  function statusFor(body) {
    const found = work.registrations.find((r) => r.body === body);
    if (!found) return "gap";
    return found.status === "registered" ? "clear" : "pending";
  }

  function submitRegistration() {
    const body = regBody === "Other" ? regBodyOther.trim() || "Other" : regBody;
    onAddRegistration(work.id, { id: uid(), body, status: regStatus, caseNumber: regCase, date: regDate, expires: regExpires });
    setRegBody(REGISTRATION_BODIES[0]); setRegBodyOther(""); setRegStatus("registered");
    setRegCase(""); setRegDate(""); setRegExpires(""); setShowAddReg(false);
  }

  function prefillGap(body) {
    if (REGISTRATION_BODIES.includes(body)) { setRegBody(body); } else { setRegBody("Other"); setRegBodyOther(body); }
    setShowAddReg(true);
  }

  const extraRegs = work.registrations.filter((r) => !expected.includes(r.body));

  return (
    <div className="rounded-lg border p-4" style={{ backgroundColor: COLORS.card, borderColor: COLORS.hairline }}>
      <div className="flex items-start justify-between gap-2">
        <div className="min-w-0">
          <p className="text-lg font-semibold truncate" style={{ fontFamily: FONT_DISPLAY, color: COLORS.ink }}>{work.title}</p>
          <p className="text-xs uppercase tracking-wide" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>
            {(WORK_TYPES.find((t) => t.value === work.type) || {}).label || work.type}
          </p>
        </div>
        <button onClick={() => (confirmDelete ? onDelete(work.id) : setConfirmDelete(true))} onBlur={() => setConfirmDelete(false)}
          className="shrink-0 rounded-md p-1.5" style={{ color: confirmDelete ? COLORS.gap : COLORS.hairline }} aria-label="Remove work">
          <Trash2 size={14} />
        </button>
      </div>
      {work.notes && <p className="text-sm mt-2 leading-relaxed" style={{ fontFamily: FONT_BODY, color: COLORS.ink }}>{work.notes}</p>}
      <div className="mt-3 space-y-2">
        {expected.map((body) => {
          const found = work.registrations.find((r) => r.body === body);
          return (
            <div key={body} className="flex items-center gap-2">
              <StaffBadge status={statusFor(body)} />
              <div className="min-w-0 flex-1">
                <p className="text-sm" style={{ fontFamily: FONT_BODY, color: COLORS.ink }}>{body}</p>
                {found ? (
                  <p className="text-xs" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>
                    {found.status === "registered" ? "Registered" : "Pending"}{found.caseNumber ? ` · ${found.caseNumber}` : ""}{found.date ? ` · ${found.date}` : ""}{found.expires ? ` · expires ${found.expires}` : ""}
                  </p>
                ) : (
                  <button onClick={() => prefillGap(body)} className="text-xs underline" style={{ fontFamily: FONT_MONO, color: COLORS.gap }}>Not started — add it</button>
                )}
              </div>
            </div>
          );
        })}
        {extraRegs.map((r) => (
          <div key={r.id} className="flex items-center gap-2">
            <StaffBadge status={r.status === "registered" ? "clear" : "pending"} />
            <div className="min-w-0 flex-1">
              <p className="text-sm" style={{ fontFamily: FONT_BODY, color: COLORS.ink }}>{r.body}</p>
              <p className="text-xs" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>
                {r.status === "registered" ? "Registered" : "Pending"}{r.caseNumber ? ` · ${r.caseNumber}` : ""}{r.date ? ` · ${r.date}` : ""}
              </p>
            </div>
          </div>
        ))}
      </div>
      {showAddReg ? (
        <div className="mt-3 rounded-md border p-3 space-y-2" style={{ borderColor: COLORS.hairline }}>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
            <select value={regBody} onChange={(e) => setRegBody(e.target.value)} className="rounded-md border px-2 py-1.5 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }}>
              {REGISTRATION_BODIES.map((b) => <option key={b} value={b}>{b}</option>)}
            </select>
            {regBody === "Other" && <input value={regBodyOther} onChange={(e) => setRegBodyOther(e.target.value)} placeholder="Name the registry" className="rounded-md border px-2 py-1.5 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }} />}
            <select value={regStatus} onChange={(e) => setRegStatus(e.target.value)} className="rounded-md border px-2 py-1.5 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }}>
              <option value="registered">Registered</option>
              <option value="pending">Pending</option>
            </select>
            <input value={regCase} onChange={(e) => setRegCase(e.target.value)} placeholder="Case / registration number" className="rounded-md border px-2 py-1.5 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }} />
            <input value={regDate} onChange={(e) => setRegDate(e.target.value)} placeholder="Date (e.g. June 2026)" className="rounded-md border px-2 py-1.5 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }} />
            <input value={regExpires} onChange={(e) => setRegExpires(e.target.value)} placeholder="Expires (optional)" className="rounded-md border px-2 py-1.5 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }} />
          </div>
          <div className="flex gap-2">
            <button onClick={submitRegistration} className="rounded-md px-3 py-1.5 text-sm hover:opacity-90" style={{ backgroundColor: COLORS.ink, color: COLORS.card, fontFamily: FONT_BODY }}>Save registration</button>
            <button onClick={() => setShowAddReg(false)} className="rounded-md border px-3 py-1.5 text-sm hover:opacity-80" style={{ borderColor: COLORS.hairline, color: COLORS.inkSoft, fontFamily: FONT_BODY, backgroundColor: "transparent" }}>Cancel</button>
          </div>
        </div>
      ) : (
        <button onClick={() => setShowAddReg(true)} className="mt-3 inline-flex items-center gap-1.5 text-xs" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>
          <Plus size={12} /> Add another registration
        </button>
      )}
      {confirmDelete && <p className="text-xs mt-2" style={{ fontFamily: FONT_BODY, color: COLORS.gap }}>Click the trash icon again to remove this work.</p>}
    </div>
  );
}

function ClearanceLeadCard({ lead, onLog }) {
  const confidence = lead.confidence || "low";
  const pillStyle = confidence === "high"
    ? { backgroundColor: COLORS.clearFill, color: COLORS.ink, borderColor: COLORS.clearFill }
    : confidence === "medium"
    ? { backgroundColor: "transparent", color: COLORS.inkSoft, borderColor: COLORS.hairline }
    : { backgroundColor: "transparent", color: COLORS.inkSoft, borderColor: COLORS.hairline, borderStyle: "dashed" };
  const label = confidence === "high" ? "High confidence" : confidence === "medium" ? "Medium confidence" : "Low confidence";
  return (
    <div className="rounded-lg border p-4" style={{ backgroundColor: COLORS.card, borderColor: COLORS.hairline }}>
      <div className="flex flex-wrap items-center justify-between gap-2 mb-2">
        <span className="text-xs uppercase tracking-wide" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>{lead.sourceType || "Record"}</span>
        <span className="text-xs uppercase tracking-wide px-2 py-0.5 rounded-full border" style={{ fontFamily: FONT_MONO, ...pillStyle }}>{label}</span>
      </div>
      <p className="text-sm mb-2 leading-relaxed" style={{ fontFamily: FONT_BODY, color: COLORS.ink }}>{lead.summary}</p>
      <div className="flex flex-wrap items-center justify-between gap-2 text-xs" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>
        <span>{lead.rightsHolder || ""}</span>
        {lead.url && <a href={lead.url} target="_blank" rel="noreferrer" className="underline" style={{ color: COLORS.gap }}>View source ↗</a>}
      </div>
      <button onClick={onLog} className="mt-3 inline-flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-md hover:opacity-90" style={{ backgroundColor: COLORS.ink, color: COLORS.card, fontFamily: FONT_BODY }}>
        <Plus size={14} /> Log this clearance
      </button>
    </div>
  );
}

function ClearanceRecordCard({ record, onDelete }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  return (
    <div className="rounded-lg border p-4 flex items-start gap-3" style={{ backgroundColor: COLORS.card, borderColor: COLORS.hairline }}>
      <StaffBadge status={record.status === "needs_license" ? "gap" : "clear"} />
      <div className="min-w-0 flex-1">
        <div className="flex items-start justify-between gap-2">
          <p className="font-semibold" style={{ fontFamily: FONT_DISPLAY, color: COLORS.ink }}>{record.title}</p>
          <button onClick={() => (confirmDelete ? onDelete(record.id) : setConfirmDelete(true))} onBlur={() => setConfirmDelete(false)} className="shrink-0 rounded-md p-1" style={{ color: confirmDelete ? COLORS.gap : COLORS.hairline }} aria-label="Remove record">
            <Trash2 size={13} />
          </button>
        </div>
        <p className="text-xs uppercase tracking-wide" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>
          {(CLEARANCE_STATUSES.find((s) => s.value === record.status) || {}).label || record.status}
        </p>
        {record.summary && <p className="text-sm mt-1" style={{ fontFamily: FONT_BODY, color: COLORS.ink }}>{record.summary}</p>}
        {record.source && <p className="text-xs mt-1" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>Source: {record.source}</p>}
        {confirmDelete && <p className="text-xs mt-1" style={{ fontFamily: FONT_BODY, color: COLORS.gap }}>Click the trash icon again to remove.</p>}
      </div>
    </div>
  );
}

function CueSheet() {
  const [loaded, setLoaded] = useState(false);
  const [works, setWorks] = useState([]);
  const [log, setLog] = useState([]);
  const [clearances, setClearances] = useState([]);
  const [workTitle, setWorkTitle] = useState("");
  const [workType, setWorkType] = useState("song");
  const [workNotes, setWorkNotes] = useState("");
  const [queryTitle, setQueryTitle] = useState("");
  const [queryCreator, setQueryCreator] = useState("");
  const [queryEra, setQueryEra] = useState("");
  const [queryUseCase, setQueryUseCase] = useState(USE_CASES[0].value);
  const [queryNotes, setQueryNotes] = useState("");
  const [queryKnownStatus, setQueryKnownStatus] = useState(CLEARANCE_STATUSES[0].value);
  const [searching, setSearching] = useState(false);
  const [searchError, setSearchError] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);

  useEffect(() => {
    try {
      const saved = localStorage.getItem("cue-sheet:data");
      if (saved) {
        const parsed = JSON.parse(saved);
        setWorks(parsed.works || []);
        setLog(parsed.log || []);
        setClearances(parsed.clearances || []);
      }
    } catch (e) {}
    setLoaded(true);
  }, []);

  function persist(newWorks, newLog, newClearances) {
    setWorks(newWorks); setLog(newLog); setClearances(newClearances);
    try { localStorage.setItem("cue-sheet:data", JSON.stringify({ works: newWorks, log: newLog, clearances: newClearances })); } catch (e) {}
  }

  function handleAddWork() {
    if (!workTitle.trim()) { setSearchError("Add a title before adding this work."); return; }
    setSearchError(null);
    persist([...works, { id: uid(), title: workTitle, type: workType, notes: workNotes, registrations: [] }], log, clearances);
    setWorkTitle(""); setWorkNotes("");
  }

  function handleAddRegistration(workId, registration) {
    persist(works.map((w) => w.id === workId ? { ...w, registrations: [...w.registrations, registration] } : w), log, clearances);
  }

  function handleDeleteWork(id) { persist(works.filter((w) => w.id !== id), log, clearances); }

  async function handleSearchRights() {
    if (!queryTitle.trim()) { setSearchError("Add a title before searching."); return; }
    setSearching(true); setSearchError(null);
    const prompt = `Work to research:\nTitle: ${queryTitle}\nKnown creator/artist: ${queryCreator || "unknown"}\nApproximate era/year: ${queryEra || "unknown"}\nIntended use: ${(USE_CASES.find((u) => u.value === queryUseCase) || {}).label || queryUseCase}\nNotes: ${queryNotes || "none provided"}`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, system: SYSTEM_PROMPT, messages: [{ role: "user", content: prompt }], tools: [{ type: "web_search_20250305", name: "web_search" }] }),
      });
      if (!res.ok) throw new Error(`The search didn't come back (status ${res.status}).`);
      const data = await res.json();
      const textBlocks = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n").trim();
      let parsed;
      try { parsed = JSON.parse(textBlocks.replace(/```json|```/g, "").trim()); }
      catch (e1) { const match = textBlocks.match(/\{[\s\S]*\}/); if (match) { parsed = JSON.parse(match[0]); } else { throw new Error("Couldn't read a structured result from this search."); } }
      const entry = { id: uid(), timestamp: Date.now(), query: { title: queryTitle, creator: queryCreator, era: queryEra, useCase: queryUseCase, notes: queryNotes }, leads: parsed.leads || [], nextSteps: parsed.nextSteps || [], contextNote: parsed.contextNote || "" };
      persist(works, [entry, ...log], clearances);
    } catch (err) { setSearchError(err.message || "Something went wrong running that search."); }
    finally { setSearching(false); }
  }

  function handleLogKnown() {
    if (!queryTitle.trim()) { setSearchError("Add a title before logging this."); return; }
    setSearchError(null);
    persist(works, log, [{ id: uid(), title: queryTitle, status: queryKnownStatus, summary: queryNotes, source: "Logged directly", dateLogged: Date.now() }, ...clearances]);
    setQueryTitle(""); setQueryCreator(""); setQueryEra(""); setQueryNotes("");
  }

  function handleLogLead(lead, entry) {
    persist(works, log, [{ id: uid(), title: entry.query.title, status: "cleared", summary: lead.summary, source: (lead.sourceType || "Record") + (lead.rightsHolder ? " — " + lead.rightsHolder : ""), dateLogged: Date.now() }, ...clearances]);
  }

  function handleDeleteClearance(id) { persist(works, log, clearances.filter((c) => c.id !== id)); }

  function handleClearAll() {
    if (confirmClear) { persist([], [], []); setConfirmClear(false); } else { setConfirmClear(true); }
  }

  function handleExport() {
    const blob = new Blob([JSON.stringify({ works, log, clearances }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "cue-sheet-export.json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  if (!loaded) {
    return <div className="min-h-screen flex items-center justify-center" style={{ backgroundColor: COLORS.paper }}><p className="text-sm" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>Tuning up...</p></div>;
  }

  return (
    <div className="min-h-screen" style={{ backgroundColor: COLORS.paper }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');`}</style>
      <div className="max-w-3xl mx-auto px-4 sm:px-8 py-10">
        <header className="mb-10">
          <span className="text-xs uppercase tracking-widest" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>Rights &amp; Registration</span>
          <h1 className="text-4xl sm:text-5xl mt-1" style={{ fontFamily: FONT_DISPLAY, color: COLORS.ink, fontWeight: 700 }}>Cue Sheet</h1>
          <div className="w-16 h-0.5 my-3" style={{ backgroundColor: COLORS.gap }} />
          <p className="text-sm sm:text-base leading-relaxed" style={{ fontFamily: FONT_BODY, color: COLORS.inkSoft }}>Track what's registered in your own catalog. Research what it takes to clear what isn't.</p>
        </header>

        <section className="mb-10 rounded-xl border p-5 sm:p-6" style={{ backgroundColor: COLORS.card, borderColor: COLORS.hairline }}>
          <div className="flex items-center gap-2 mb-1"><Music size={18} style={{ color: COLORS.ink }} /><h2 className="text-xl" style={{ fontFamily: FONT_DISPLAY, color: COLORS.ink, fontWeight: 600 }}>My catalog</h2></div>
          <p className="text-sm mb-4" style={{ fontFamily: FONT_BODY, color: COLORS.inkSoft }}>Add a work you've created, then log each registration as you file it.</p>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <input value={workTitle} onChange={(e) => setWorkTitle(e.target.value)} placeholder="Title" className="rounded-md border px-3 py-2 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }} />
            <select value={workType} onChange={(e) => setWorkType(e.target.value)} className="rounded-md border px-3 py-2 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }}>
              {WORK_TYPES.map((t) => <option key={t.value} value={t.value}>{t.label}</option>)}
            </select>
            <input value={workNotes} onChange={(e) => setWorkNotes(e.target.value)} placeholder="Notes (optional)" className="rounded-md border px-3 py-2 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }} />
          </div>
          <button onClick={handleAddWork} className="mt-3 inline-flex items-center gap-2 rounded-md px-4 py-2 text-sm font-medium hover:opacity-90" style={{ backgroundColor: COLORS.ink, color: COLORS.card, fontFamily: FONT_BODY }}>
            <Plus size={16} /> Add to catalog
          </button>
          {works.length > 0 && <div className="mt-6 space-y-4">{works.map((w) => <WorkCard key={w.id} work={w} onAddRegistration={handleAddRegistration} onDelete={handleDeleteWork} />)}</div>}
        </section>

        <section className="mb-10 rounded-xl border p-5 sm:p-6" style={{ backgroundColor: COLORS.card, borderColor: COLORS.hairline }}>
          <div className="flex items-center gap-2 mb-1"><Search size={18} style={{ color: COLORS.ink }} /><h2 className="text-xl" style={{ fontFamily: FONT_DISPLAY, color: COLORS.ink, fontWeight: 600 }}>Clearance research</h2></div>
          <p className="text-sm mb-4" style={{ fontFamily: FONT_BODY, color: COLORS.inkSoft }}>For material that isn't yours — find out who holds the rights and what it'd take to use it.</p>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <input value={queryTitle} onChange={(e) => setQueryTitle(e.target.value)} placeholder="Title" className="rounded-md border px-3 py-2 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }} />
            <input value={queryCreator} onChange={(e) => setQueryCreator(e.target.value)} placeholder="Known artist / writer" className="rounded-md border px-3 py-2 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }} />
            <input value={queryEra} onChange={(e) => setQueryEra(e.target.value)} placeholder="Approx. year / era" className="rounded-md border px-3 py-2 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }} />
            <select value={queryUseCase} onChange={(e) => setQueryUseCase(e.target.value)} className="rounded-md border px-3 py-2 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }}>
              {USE_CASES.map((u) => <option key={u.value} value={u.value}>{u.label}</option>)}
            </select>
          </div>
          <textarea value={queryNotes} onChange={(e) => setQueryNotes(e.target.value)} placeholder="Notes — what you already know" rows={2} className="w-full mt-3 rounded-md border px-3 py-2 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }} />
          {searchError && <div className="flex items-start gap-2 mt-4 text-sm" style={{ color: COLORS.gap, fontFamily: FONT_BODY }}><AlertCircle size={16} className="mt-0.5 shrink-0" /><span>{searchError}</span></div>}
          <div className="flex flex-col sm:flex-row gap-3 mt-5">
            <button onClick={handleSearchRights} disabled={searching} className="inline-flex items-center justify-center gap-2 rounded-md px-4 py-2 text-sm font-medium hover:opacity-90 disabled:opacity-50" style={{ backgroundColor: COLORS.ink, color: COLORS.card, fontFamily: FONT_BODY }}>
              {searching ? <Loader2 size={16} className="animate-spin" /> : <Search size={16} />}{searching ? "Searching the rights..." : "Search the rights"}
            </button>
            <button onClick={handleLogKnown} disabled={searching} className="inline-flex items-center justify-center gap-2 rounded-md border px-4 py-2 text-sm font-medium hover:opacity-80 disabled:opacity-50" style={{ borderColor: COLORS.ink, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "transparent" }}>
              <Plus size={16} /> Log directly — I already know the status
            </button>
          </div>
          <div className="mt-3">
            <label className="text-xs uppercase tracking-wide" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>If logging directly, status</label>
            <select value={queryKnownStatus} onChange={(e) => setQueryKnownStatus(e.target.value)} className="w-full sm:w-64 mt-1 rounded-md border px-3 py-2 text-sm" style={{ borderColor: COLORS.hairline, color: COLORS.ink, fontFamily: FONT_BODY, backgroundColor: "#FFFFFF" }}>
              {CLEARANCE_STATUSES.map((s) => <option key={s.value} value={s.value}>{s.label}</option>)}
            </select>
          </div>
        </section>

        {log.length > 0 && (
          <section className="mb-10">
            <div className="flex items-center gap-2 mb-4"><BookOpen size={18} style={{ color: COLORS.inkSoft }} /><h2 className="text-xl" style={{ fontFamily: FONT_DISPLAY, color: COLORS.ink, fontWeight: 600 }}>Research log</h2></div>
            <div className="space-y-6">
              {log.map((entry, idx) => {
                const entryNumber = String(log.length - idx).padStart(3, "0");
                return (
                  <div key={entry.id}>
                    <div className="flex items-baseline gap-2 mb-2">
                      <span className="text-xs uppercase tracking-widest" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>Entry {entryNumber}</span>
                      <span className="text-xs" style={{ fontFamily: FONT_MONO, color: COLORS.hairline }}>{entry.query.title}</span>
                    </div>
                    {entry.contextNote && <p className="text-sm mb-3 italic" style={{ fontFamily: FONT_BODY, color: COLORS.inkSoft }}>{entry.contextNote}</p>}
                    {entry.leads.length === 0 ? (
                      <p className="text-sm" style={{ fontFamily: FONT_BODY, color: COLORS.inkSoft }}>No leads turned up. Try the exact recording title, a co-writer's name, or the label/publisher.</p>
                    ) : (
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {entry.leads.map((lead, i) => <ClearanceLeadCard key={i} lead={lead} onLog={() => handleLogLead(lead, entry)} />)}
                      </div>
                    )}
                    {entry.nextSteps && entry.nextSteps.length > 0 && (
                      <div className="mt-3">
                        <p className="text-xs uppercase tracking-wide mb-1" style={{ fontFamily: FONT_MONO, color: COLORS.inkSoft }}>Next steps</p>
                        <ul className="text-sm space-y-1" style={{ fontFamily: FONT_BODY, color: COLORS.ink }}>
                          {entry.nextSteps.map((step, i) => <li key={i} className="flex gap-2"><ChevronRight size={14} className="mt-0.5 shrink-0" style={{ color: COLORS.gap }} /><span>{step}</span></li>)}
                        </ul>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </section>
        )}

        <section>
          <div className="flex items-center gap-2 mb-4"><CheckCircle2 size={18} style={{ color: COLORS.clear }} /><h2 className="text-xl" style={{ fontFamily: FONT_DISPLAY, color: COLORS.ink, fontWeight: 600 }}>Clearances obtained</h2></div>
          {clearances.length === 0 ? (
            <p className="text-sm" style={{ fontFamily: FONT_BODY, color: COLORS.inkSoft }}>Nothing logged yet. Resolve a search above, or log a clearance you already know about.</p>
          ) : (
            <div className="space-y-3">{clearances.map((record) => <ClearanceRecordCard key={record.id} record={record} onDelete={handleDeleteClearance} />)}</div>
          )}
        </section>

        <footer className="mt-12 pt-6 border-t flex flex-wrap items-center justify-between gap-3" style={{ borderColor: COLORS.hairline }}>
          <button onClick={handleExport} className="inline-flex items-center gap-2 text-sm hover:opacity-80" style={{ color: COLORS.inkSoft, fontFamily: FONT_BODY }}>
            <Download size={14} /> Export sheet
          </button>
          <button onClick={handleClearAll} onBlur={() => setConfirmClear(false)} className="text-xs hover:opacity-80" style={{ color: confirmClear ? COLORS.gap : COLORS.hairline, fontFamily: FONT_MONO }}>
            {confirmClear ? "Click again to clear all records" : "Reset all records"}
          </button>
        </footer>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<CueSheet />);
  </script>
</body>
</html>
