<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picture My World</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --dusk:#151a2b; --dusk2:#1e2438; --amber:#f5a623; --ember:#e8683a;
  --cream:#f6efe4; --mist:#9aa3bd;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--dusk);color:var(--cream);font-family:'Outfit',system-ui,sans-serif;min-height:100vh}
header{padding:26px 20px 8px;text-align:center}
h1{font-family:'Fraunces',Georgia,serif;font-weight:700;font-size:clamp(1.7rem,5vw,2.5rem);letter-spacing:.01em}
h1 em{font-style:normal;background:linear-gradient(90deg,var(--amber),var(--ember));-webkit-background-clip:text;background-clip:text;color:transparent}
.tag{color:var(--mist);font-weight:300;font-size:.9rem;margin-top:4px;letter-spacing:.14em;text-transform:uppercase}
.packs{max-width:900px;margin:22px auto;padding:0 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.packlabel{grid-column:1/-1;font-family:'Fraunces',serif;color:var(--amber);font-size:1.05rem;margin:10px 2px -4px}
.card{position:relative;border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid #2b3350;transition:transform .18s ease}
.card:hover,.card:focus-visible{transform:translateY(-3px);outline:2px solid var(--amber);outline-offset:2px}
.card img{width:100%;display:block;aspect-ratio:1/1;object-fit:cover}
.card span{position:absolute;left:0;right:0;bottom:0;padding:22px 10px 8px;font-size:.82rem;background:linear-gradient(transparent,rgba(10,12,22,.88))}
#game{display:none;max-width:560px;margin:0 auto;padding:0 14px 40px}
.bar{display:flex;justify-content:space-between;align-items:center;margin:14px 2px 10px;gap:8px;flex-wrap:wrap}
.bar .title{font-family:'Fraunces',serif;font-size:1.15rem}
.stats{color:var(--mist);font-size:.9rem;display:flex;gap:14px}
.btn{background:var(--dusk2);color:var(--cream);border:1px solid #333c5e;border-radius:999px;padding:8px 16px;font-family:inherit;font-size:.88rem;cursor:pointer}
.btn:hover{border-color:var(--amber)}
.btn.gold{background:linear-gradient(90deg,var(--amber),var(--ember));color:#221507;border:none;font-weight:600}
.diff{display:flex;gap:8px;margin-bottom:12px}
.sunrise{height:5px;border-radius:999px;background:#262d47;overflow:hidden;margin-bottom:12px}
.sunrise div{height:100%;width:0;background:linear-gradient(90deg,#5a3f8f,var(--ember),var(--amber),#ffe9a3);transition:width .35s ease}
#board{display:grid;gap:3px;background:#0c0f1c;border-radius:12px;padding:3px;touch-action:manipulation}
.tile{position:relative;aspect-ratio:1/1;background-size:calc(var(--n)*100%) calc(var(--n)*100%);background-image:var(--img);border-radius:5px;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease}
.tile.sel{transform:scale(.93);box-shadow:0 0 0 3px var(--amber)}
.tile.done{cursor:default}
#win{display:none;text-align:center;margin-top:16px;font-family:'Fraunces',serif;font-size:1.3rem;color:var(--amber)}
footer{text-align:center;color:#4d5675;font-size:.75rem;padding:22px 0 30px}
</style>
</head>
<body>
<header>
  <h1>Picture <em>My</em> World</h1>
  <div class="tag">Original photography &middot; puzzle packs</div>
</header>

<main>
  <div class="packs" id="packs"></div>

  <div id="game">
    <div class="bar">
      <div class="title" id="gtitle"></div>
      <div class="stats"><span id="moves">0 moves</span><span id="time">0:00</span></div>
    </div>
    <div class="diff">
      <button class="btn" data-n="3">Easy 3&times;3</button>
      <button class="btn" data-n="4">Medium 4&times;4</button>
      <button class="btn" data-n="5">Hard 5&times;5</button>
      <button class="btn" id="back" style="margin-left:auto">&larr; Gallery</button>
    </div>
    <div class="sunrise"><div id="prog"></div></div>
    <div id="board"></div>
    <div id="win">Beautiful! Puzzle complete. <br><button class="btn gold" id="again" style="margin-top:12px">Play again</button></div>
  </div>
</main>
<footer>Picture My World &middot; a Wonderful World Media prototype &middot; all photos &copy; the artist</footer>

let N=3, tiles=[], sel=-1, moves=0, timer=null, secs=0, current=null;

const packsEl=document.getElementById('packs');
const order=['Newark','Skylines & Sunrises','Seasons','Southern Roots','Moon'];
order.forEach(p=>{
  const imgs=IMAGES.filter(i=>i.pack===p);
  if(!imgs.length)return;
  const lab=document.createElement('div');lab.className='packlabel';lab.textContent=p;packsEl.appendChild(lab);
  imgs.forEach(im=>{
    const c=document.createElement('div');c.className='card';c.tabIndex=0;
    c.innerHTML=`<img src="${im.data}" alt="${im.title}"><span>${im.title}</span>`;
    c.onclick=()=>start(im); c.onkeydown=e=>{if(e.key==='Enter')start(im)};
    packsEl.appendChild(c);
  });
});

function start(im){
  current=im;
  packsEl.style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('gtitle').textContent=im.title;
  build();
}
document.getElementById('back').onclick=()=>{
  clearInterval(timer);
  document.getElementById('game').style.display='none';
  packsEl.style.display='grid';
};
document.querySelectorAll('.diff .btn[data-n]').forEach(b=>b.onclick=()=>{N=+b.dataset.n;build();});
document.getElementById('again').onclick=build;

function build(){
  const board=document.getElementById('board');
  document.getElementById('win').style.display='none';
  board.style.display='grid';
  board.style.gridTemplateColumns=`repeat(${N},1fr)`;
  moves=0;secs=0;sel=-1;
  document.getElementById('moves').textContent='0 moves';
  document.getElementById('time').textContent='0:00';
  clearInterval(timer);
  timer=setInterval(()=>{secs++;const m=Math.floor(secs/60),s=String(secs%60).padStart(2,'0');document.getElementById('time').textContent=`${m}:${s}`;},1000);
  tiles=[...Array(N*N).keys()];
  do{ for(let i=tiles.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[tiles[i],tiles[j]]=[tiles[j],tiles[i]];} }while(tiles.every((v,i)=>v===i));
  board.innerHTML='';
  tiles.forEach((v,i)=>{
    const t=document.createElement('div');
    t.className='tile';
    t.style.setProperty('--n',N);
    t.style.setProperty('--img',`url(${current.data})`);
    setPos(t,v);
    t.onclick=()=>tap(i,t);
    board.appendChild(t);
  });
  updateProg();
}
function setPos(el,v){
  const r=Math.floor(v/N),c=v%N;
  el.style.backgroundPosition=`${c*100/(N-1)}% ${r*100/(N-1)}%`;
}
function tap(i){
  const board=document.getElementById('board');
  const els=board.children;
  if(sel===-1){sel=i;els[i].classList.add('sel');return;}
  if(sel===i){els[i].classList.remove('sel');sel=-1;return;}
  els[sel].classList.remove('sel');
  [tiles[sel],tiles[i]]=[tiles[i],tiles[sel]];
  setPos(els[sel],tiles[sel]);setPos(els[i],tiles[i]);
  sel=-1;moves++;
  document.getElementById('moves').textContent=`${moves} moves`;
  updateProg();
  if(tiles.every((v,x)=>v===x)) winGame();
}
function updateProg(){
  const correct=tiles.filter((v,i)=>v===i).length;
  document.getElementById('prog').style.width=(correct/(N*N)*100)+'%';
}
function winGame(){
  clearInterval(timer);
  document.getElementById('win').style.display='block';
  [...document.getElementById('board').children].forEach(t=>{t.classList.add('done');t.onclick=null;});
}
</script>
</body>
</html>
